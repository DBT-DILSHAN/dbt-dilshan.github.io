/* =========================================================
   TOKENS - BLUE THEME
   #FFFFFF (White)
   #E5E5E5 (Light Gray)
   #3B82F6 (Blue Accent)
   #0a0a0a (Near Black)
   #000000 (Black)
========================================================= */
:root {
  /* DARK THEME (default) */
  --bg: #000000;
  --bg-alt: #050505;
  --surface: rgba(5, 5, 5, 0.72);
  --surface-2: rgba(5, 5, 5, 0.48);
  --glass: rgba(5, 5, 5, 0.66);
  --glass-border: rgba(59, 130, 246, 0.16);
  --glass-highlight: rgba(255, 255, 255, 0.04);
  --border: rgba(59, 130, 246, 0.12);
  --text: #FFFFFF;
  --text-dim: #E5E5E5;
  --text-faint: #999999;
  --shadow: rgba(0, 0, 0, 0.70);
  --shadow-strong: rgba(0, 0, 0, 0.85);
  --input-bg: rgba(255, 255, 255, 0.03);
  --glass-blur: blur(32px) saturate(220%);

  /* Blue Accent - Enhanced */
  --gold: #3B82F6;
  --gold-light: #60A5FA;
  --gold-soft: #93C5FD;
  --gold-dark: #1E40AF;
  --gold-glow: rgba(59, 130, 246, 0.10);
  --gold-gradient: linear-gradient(135deg, #3B82F6 0%, #60A5FA 50%, #93C5FD 100%);
  
  /* Additional Color Palette */
  --blue-accent: #3B82F6;
  --purple-accent: #A855F7;
  --cyan-accent: #06B6D4;
  --rose-accent: #F43F5E;
  
  --navy: #0a0a0a;
  --black: #000000;
  --white: #FFFFFF;
  --gray: #E5E5E5;

  --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-body: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  --font-mono: 'Space Mono', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;

  --radius: 16px;
  --ease: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* =========================================================
   LIGHT THEME
========================================================= */
[data-theme="light"] {
  --bg: #FFFFFF;
  --bg-alt: #f5f5f5;
  --surface: rgba(255, 255, 255, 0.75);
  --surface-2: rgba(255, 255, 255, 0.55);
  --glass: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(59, 130, 246, 0.25);
  --glass-highlight: rgba(255, 255, 255, 0.25);
  --border: rgba(59, 130, 246, 0.20);
  --text: #0a0a0a;
  --text-dim: #3a4a6a;
  --text-faint: #7a8aaa;
  --shadow: rgba(0, 0, 0, 0.06);
  --shadow-strong: rgba(0, 0, 0, 0.10);
  --input-bg: rgba(10, 10, 10, 0.04);
  --glass-blur: blur(32px) saturate(220%);

  --gold: #3B82F6;
  --gold-light: #60A5FA;
  --gold-soft: #93C5FD;
  --gold-dark: #1E40AF;
  --gold-glow: rgba(59, 130, 246, 0.15);
  --gold-gradient: linear-gradient(135deg, #3B82F6 0%, #60A5FA 50%, #93C5FD 100%);
  
  /* Additional Color Palette */
  --blue-accent: #3B82F6;
  --purple-accent: #A855F7;
  --cyan-accent: #06B6D4;
  --rose-accent: #F43F5E;
  
  --navy: #0a0a0a;
  --black: #000000;
  --white: #FFFFFF;
  --gray: #E5E5E5;
}

/* =========================================================
   THEME TOGGLE - LIQUID GLASS SWITCH
========================================================= */
.theme-toggle-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
}

.theme-switch {
  position: relative;
  width: 56px;
  height: 30px;
  border-radius: 99px;
  background: var(--glass);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 
    inset 0 2px 4px rgba(0,0,0,0.06),
    0 4px 16px rgba(0,0,0,0.04);
  overflow: hidden;
  flex-shrink: 0;
}

.theme-switch::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 99px;
  background: var(--gold-gradient);
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 0;
}

.theme-switch .switch-track {
  position: absolute;
  inset: 2px;
  border-radius: 99px;
  background: var(--surface);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1;
  transition: background 0.5s ease;
}

.theme-switch .switch-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--gold-gradient);
  z-index: 2;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.5s ease;
  box-shadow: 
    0 2px 8px rgba(0,0,0,0.15),
    0 0 20px rgba(59, 130, 246, 0.20);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0a0a0a;
  font-size: 12px;
}

.theme-switch .switch-thumb i {
  font-size: 12px;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  color: #0a0a0a;
}

[data-theme="light"] .theme-switch .switch-thumb {
  transform: translateX(26px);
}

[data-theme="light"] .theme-switch .switch-thumb i {
  transform: rotate(180deg);
}

.theme-switch .switch-glow {
  position: absolute;
  top: -4px;
  left: -4px;
  right: -4px;
  bottom: -4px;
  border-radius: 99px;
  background: var(--gold-gradient);
  opacity: 0;
  filter: blur(12px);
  transition: opacity 0.5s ease;
  z-index: 0;
}

.theme-switch:hover .switch-glow {
  opacity: 0.15;
}

[data-theme="light"] .theme-switch .switch-glow {
  opacity: 0.08;
}

.theme-switch .switch-ripple {
  position: absolute;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.15;
  transform: scale(0);
  animation: switchRipple 0.6s ease-out forwards;
  pointer-events: none;
  z-index: 3;
}

@keyframes switchRipple {
  to { transform: scale(4); opacity: 0; }
}

/* =========================================================
   GLASS
========================================================= */
.glass {
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 20px;
}

.glass {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
}

/* =========================================================
   LIQUID GLASS AMBIENT BLOBS
   Soft moving light pools behind the glass layers, giving the
   whole page a "liquid" depth without hurting readability.
========================================================= */
.liquid-blobs{
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.liquid-blobs .blob{
  position: absolute;
  border-radius: 50%;
  filter: blur(70px);
  opacity: .35;
  background: var(--gold-gradient);
  will-change: transform;
}
.blob-1{ width: 42vmax; height: 42vmax; top: -14vmax; left: -12vmax; animation: blobDrift1 26s ease-in-out infinite; }
.blob-2{ width: 34vmax; height: 34vmax; bottom: -12vmax; right: -10vmax; animation: blobDrift2 32s ease-in-out infinite; opacity: .22; }
.blob-3{ width: 26vmax; height: 26vmax; top: 40%; left: 60%; animation: blobDrift3 38s ease-in-out infinite; opacity: .16; }
[data-theme="light"] .liquid-blobs .blob{ opacity: .18; }
[data-theme="light"] .blob-2{ opacity: .12; }
[data-theme="light"] .blob-3{ opacity: .09; }
[data-theme="dark"] .liquid-blobs .blob{ opacity: .16; }
[data-theme="dark"] .blob-2{ opacity: .10; }
[data-theme="dark"] .blob-3{ opacity: .07; }

@keyframes blobDrift1{
  0%, 100% { transform: translate(0, 0) scale(1); border-radius: 50%; }
  33%      { transform: translate(6vmax, 4vmax) scale(1.08); border-radius: 46% 54% 60% 40% / 50% 45% 55% 50%; }
  66%      { transform: translate(-3vmax, 6vmax) scale(0.96); border-radius: 60% 40% 45% 55% / 40% 55% 45% 60%; }
}
@keyframes blobDrift2{
  0%, 100% { transform: translate(0, 0) scale(1); border-radius: 50%; }
  50%      { transform: translate(-5vmax, -5vmax) scale(1.1); border-radius: 55% 45% 50% 50% / 45% 55% 45% 55%; }
}
@keyframes blobDrift3{
  0%, 100% { transform: translate(0, 0) scale(1); }
  50%      { transform: translate(-8vmax, -4vmax) scale(1.15); }
}
@media (prefers-reduced-motion: reduce){
  .liquid-blobs .blob{ animation: none; }
}
@media (max-width: 768px){
  .liquid-blobs .blob{ filter: blur(30px); }
  .blob-3{ display: none; }
  .blob-2{ display: none; }
}
@media (max-width: 768px){
  :root{ --glass-blur: blur(10px) saturate(140%); }
}

/* =========================================================
   GRADIENT MESH BACKGROUND
========================================================= */
.gradient-mesh{
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  background:
    radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.14), transparent 42%),
    radial-gradient(circle at 85% 25%, rgba(96, 165, 250, 0.11), transparent 46%),
    radial-gradient(circle at 50% 85%, rgba(147, 197, 253, 0.09), transparent 50%),
    radial-gradient(circle at 90% 90%, rgba(30, 64, 175, 0.11), transparent 42%);
  background-size: 200% 200%;
  animation: meshFlow 24s ease-in-out infinite;
  filter: blur(6px);
  opacity: .8;
}
[data-theme="light"] .gradient-mesh{ opacity: .45; }
@keyframes meshFlow{
  0%, 100%{ background-position: 0% 0%, 100% 0%, 50% 100%, 100% 100%; }
  50%{ background-position: 100% 100%, 0% 100%, 50% 0%, 0% 0%; }
}
@media (prefers-reduced-motion: reduce){ .gradient-mesh{ animation: none; } }
@media (max-width: 768px){
  .gradient-mesh{ filter: none; animation: none; background-position: 0% 0%, 100% 0%, 50% 100%, 100% 100%; opacity: .35; }
}

/* =========================================================
   GLOWING CIRCUIT LINES OVERLAY
========================================================= */
.circuit-glow-lines{
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .5;
}
.circuit-glow-lines path{
  fill: none;
  stroke: var(--gold);
  stroke-width: 1.2;
  stroke-linecap: round;
  stroke-dasharray: 6 16;
  filter: drop-shadow(0 0 6px var(--gold)) drop-shadow(0 0 2px var(--gold-light));
  opacity: .3;
  animation: circuitFlow 7s linear infinite;
}
.circuit-glow-lines path:nth-child(2){ animation-duration: 9s; animation-delay: -2s; opacity: .22; }
.circuit-glow-lines path:nth-child(3){ animation-duration: 5.5s; animation-delay: -1s; opacity: .28; }
.circuit-glow-lines path:nth-child(4){ animation-duration: 10s; animation-delay: -4s; opacity: .18; }
.circuit-glow-lines circle{
  fill: var(--gold-light);
  filter: drop-shadow(0 0 5px var(--gold));
  opacity: .5;
}
@keyframes circuitFlow{ to{ stroke-dashoffset: -440; } }
[data-theme="light"] .circuit-glow-lines{ opacity: .35; }
@media (prefers-reduced-motion: reduce){ .circuit-glow-lines path{ animation: none; } }
@media (max-width: 768px){
  .circuit-glow-lines{ opacity: .18; }
  .circuit-glow-lines path{ animation: none; filter: none; stroke-dasharray: none; }
  .circuit-glow-lines circle{ display: none; }
}

/* =========================================================
   NVQ PROGRESS BAR
========================================================= */
.nvq-progress-wrap{ margin-top: 14px; }
.nvq-progress-bar{
  width: 100%;
  height: 6px;
  border-radius: 99px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}
[data-theme="light"] .nvq-progress-bar{ background: rgba(0,0,0,0.08); }
.nvq-progress-fill{
  height: 100%;
  width: 0%;
  background: var(--gold-gradient);
  border-radius: 99px;
  transition: width 1.2s var(--ease);
}
.nvq-progress-label{
  display: inline-block;
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-faint);
  letter-spacing: 0.03em;
}

/* =========================================================
   FLOATING WHATSAPP BUTTON
========================================================= */
.whatsapp-float{
  position: fixed;
  bottom: 22px;
  right: 22px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #25D366;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  z-index: 700;
  box-shadow: 0 6px 24px rgba(37,211,102,0.45);
  animation: waPulse 2.6s ease-in-out infinite;
  transition: transform 0.25s ease;
}
.whatsapp-float:hover{ transform: scale(1.08); }
@keyframes waPulse{
  0%, 100%{ box-shadow: 0 6px 24px rgba(37,211,102,0.45); }
  50%{ box-shadow: 0 6px 24px rgba(37,211,102,0.45), 0 0 0 10px rgba(37,211,102,0.12); }
}
@media (prefers-reduced-motion: reduce){ .whatsapp-float{ animation: none; } }
@media (max-width: 768px){
  .whatsapp-float{ width: 50px; height: 50px; font-size: 1.4rem; bottom: 16px; right: 16px; animation: none; }
}

/* =========================================================
   STAR RATING BAR
========================================================= */
.star-rating-bar{
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 16px;
  background: var(--glass);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
}
.star-rating-icon{
  font-size: 1.4rem;
  color: rgba(255,255,255,0.15);
  cursor: pointer;
  transition: color .2s ease, transform .2s var(--ease);
}
[data-theme="light"] .star-rating-icon{ color: rgba(0,0,0,0.15); }
.star-rating-icon:hover{ transform: scale(1.15); }
.star-rating-icon.active{
  color: var(--gold);
  filter: drop-shadow(0 0 6px var(--gold-glow));
}
.star-rating-label{
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: .68rem;
  color: var(--text-faint);
  letter-spacing: .03em;
}
@media (max-width: 480px){
  .star-rating-icon{ font-size: 1.2rem; }
  .star-rating-label{ font-size: .6rem; margin-left: 0; width: 100%; }
}

/* =========================================================
   BASE
========================================================= */
*{ margin:0; padding:0; box-sizing:border-box; }
html{ 
  scroll-behavior:smooth; 
  scroll-padding-top: 80px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body{
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 400;
  overflow-x: hidden;
  cursor: default;
  line-height: 1.7;
  transition: background 0.5s ease, color 0.5s ease;
  letter-spacing: 0.3px;
}
img{ max-width:100%; display:block; height:auto; }
a{ color:inherit; text-decoration:none; }
ul,li{ list-style:none; }
button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input, textarea, select{ font-family:inherit; }
::selection{ background: var(--gold); color: #0a0a0a; }

/* =========================================================
   LOADER
========================================================= */
#loader{
  position:fixed; inset:0; z-index:9999;
  background: var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  transition: opacity .6s var(--ease), visibility .6s var(--ease), background 0.5s ease;
}
#loader.hidden{ opacity:0; visibility:hidden; }
.loader-grid{
  position:absolute; inset:0;
  background-image: linear-gradient(rgba(59, 130, 246, .04) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, .04) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(circle at center, black, transparent 75%);
}
.loader-core{ position:relative; width:120px; height:120px; display:flex; align-items:center; justify-content:center; }
.bolt-icon-bg, .bolt-icon-fill{ position:absolute; inset:0; width:100%; height:100%; }
.bolt-icon-bg path{ fill: rgba(255,255,255,0.08); }
[data-theme="light"] .bolt-icon-bg path{ fill: rgba(0,0,0,0.08); }
.bolt-icon-fill{ clip-path: inset(100% 0 0 0); transition: clip-path 0.15s linear; }
.bolt-icon-fill path{
  fill: var(--gold);
  filter: drop-shadow(0 0 10px var(--gold)) drop-shadow(0 0 22px var(--gold-glow));
}
.bolt-sparks{ position:absolute; inset:0; pointer-events:none; }
.bolt-spark{
  position:absolute; top:50%; left:50%; width:4px; height:4px; border-radius:50%;
  background: var(--gold-light);
  box-shadow: 0 0 6px var(--gold-light);
  opacity:0;
  animation: sparkFly 0.6s ease-out forwards;
}
@keyframes sparkFly{
  0%{ opacity:1; transform: translate(-50%,-50%) translate(0,0) scale(1); }
  100%{ opacity:0; transform: translate(-50%,-50%) translate(var(--sx), var(--sy)) scale(0.3); }
}
.bolt-flash{
  position:absolute; inset:-24px; border-radius:50%;
  background: radial-gradient(circle, rgba(255,255,255,0.9), var(--gold) 40%, transparent 70%);
  opacity:0; transform:scale(0.5);
  pointer-events:none;
}
.bolt-flash.active{ animation: boltFlashPop 0.5s ease-out forwards; }
@keyframes boltFlashPop{
  0%{ opacity:0; transform:scale(0.5); }
  40%{ opacity:.9; transform:scale(1.5); }
  100%{ opacity:0; transform:scale(2.1); }
}
.loader-percent{ font-family: var(--font-mono); font-size:1.1rem; color: var(--gold); position:absolute; bottom:-34px; }
.loader-label{ font-family: var(--font-mono); letter-spacing:.3em; font-size:.7rem; color: var(--text-dim); }
.loader-bar-wrap{
  width: 200px;
  height: 3px;
  background: rgba(0,0,0,0.04);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 4px;
}
.loader-bar-fill{
  height: 100%;
  width: 0%;
  background: var(--gold-gradient);
  border-radius: 99px;
  transition: width 0.3s;
}
[data-theme="dark"] .loader-bar-wrap {
  background: rgba(255,255,255,0.06);
}
[data-theme="light"] .loader-bar-wrap {
  background: rgba(0,0,0,0.06);
}
@media (prefers-reduced-motion: reduce){
  .bolt-spark{ display:none; }
  .bolt-flash.active{ animation: none; opacity: 0; }
}


/* =========================================================
   SCROLL PROGRESS
========================================================= */
.scroll-progress{
  position:fixed; top:0; left:0; height:3px; width:0%;
  background: var(--gold-gradient);
  background-size: 300% 100%;
  animation: progressGlow 3s ease-in-out infinite;
  z-index:9000;
  border-radius: 0 99px 99px 0;
}
@keyframes progressGlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* =========================================================
   NAVBAR
========================================================= */
.navbar{
  position:fixed; top:0; left:0; right:0; z-index:800;
  display:flex; align-items:center; justify-content:space-between;
  padding: 16px 5%;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,0.10);
  transition: background .4s var(--ease), border-color .4s var(--ease), padding .4s var(--ease);
}
[data-theme="dark"] .navbar {
  background: rgba(0, 0, 0, 0.75);
  border-bottom: 1px solid rgba(59, 130, 246, 0.08);
}
[data-theme="light"] .navbar {
  background: rgba(255, 255, 255, 0.75);
  border-bottom: 1px solid rgba(59, 130, 246, 0.12);
}
.navbar.scrolled{
  padding: 10px 5%;
  background: rgba(255,255,255,0.55);
}
[data-theme="dark"] .navbar.scrolled {

/* =========================================================
   GLASS CARD - Blue Elegance
========================================================= */
.glass-card {
  background: var(--surface);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 
    0 8px 32px var(--shadow),
    inset 0 1.5px 0 rgba(255, 255, 255, 0.06),
    inset 0 -1px 0 rgba(0, 0, 0, 0.25),
    inset 0 0 40px rgba(59, 130, 246, 0.02);
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.5s ease, box-shadow 0.5s ease, border-radius 0.6s ease;
  transform-style: preserve-3d;
  will-change: transform;
  position: relative;
  overflow: hidden;
}
/* Liquid specular sheen - injected span, follows pointer, gives a glassy "wet" highlight */
.glass-shine {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(
    140px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(255, 255, 255, 0.35),
    rgba(255, 255, 255, 0.08) 32%,
    transparent 65%
  );
  mix-blend-mode: overlay;
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
  z-index: 2;
}
.glass-card:hover .glass-shine { opacity: 1; }
/* Thin top-edge light catch, like glass refracting ambient light */
.glass-card > .glass-edge {
  position: absolute;
  top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
  opacity: .55;
  z-index: 2;
  pointer-events: none;
}
@keyframes liquidBreathe {
  0%, 100% { border-radius: var(--radius); }
  50% { border-radius: calc(var(--radius) + 8px) calc(var(--radius) - 4px) calc(var(--radius) + 6px) calc(var(--radius) - 2px); }
}
@media (hover: hover) {
  .glass-card:hover { animation: liquidBreathe 5s ease-in-out infinite; }
}
.glass-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(
    circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(59, 130, 246, 0.08) 0%,
    transparent 60%
  );
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 0;
}
.glass-card:hover::before {
  opacity: 1;
}
.glass-card::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: var(--radius);
  background: linear-gradient(
    135deg,
    rgba(59, 130, 246, 0.06),
    transparent 40%,
    rgba(59, 130, 246, 0.03),
    transparent 70%,
    rgba(59, 130, 246, 0.05)
  );
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
  z-index: -1;
}
.glass-card:hover::after {
  opacity: 1;
}
.glass-card:hover {
  transform: translateY(-6px) scale(1.01) perspective(800px) rotateX(var(--ry, 0deg)) rotateY(var(--rx, 0deg));
  border-color: rgba(59, 130, 246, 0.25);
  box-shadow: 
    0 20px 60px rgba(59, 130, 246, 0.06),
    0 8px 32px var(--shadow);
}
.glass-ripple {
  position: absolute;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: radial-gradient(
    circle,
    rgba(59, 130, 246, 0.06) 0%,
    transparent 70%
  );
  transform: translate(-50%, -50%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 1;
}
.glass-card:hover .glass-ripple {
  opacity: 1;
}

[data-theme="light"] .glass-card {
  box-shadow: 
    0 8px 32px var(--shadow),
    inset 0 1.5px 0 rgba(255, 255, 255, 0.35),
    inset 0 -1px 0 rgba(0, 0, 0, 0.04),
    inset 0 0 40px rgba(59, 130, 246, 0.02);
}
[data-theme="light"] .glass-card::before {
  background: radial-gradient(
    circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(59, 130, 246, 0.10) 0%,
    transparent 60%
  );
}

/* =========================================================
   ENHANCED BUTTON GLOW EFFECTS
========================================================= */
.btn {
  position: relative;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: var(--gold-gradient);
  opacity: 0;
  z-index: -1;
  filter: blur(20px);
  transition: opacity 0.4s ease, filter 0.4s ease;

}

  filter: blur(24px);

}

  filter: blur(16px);
}

/* Additional glow on active state */
.btn:active {
  transform: translateY(2px) scale(0.98) !important;
}

  opacity: 0.5 !important;
}

/* Smooth transition animations */
.btn {
  transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.45s ease,
              border-color 0.45s ease;
}

/* Hover animation with subtle scale and lift */
.btn:hover {
  animation: buttonBreathe 1s ease-in-out infinite;
}

@keyframes buttonBreathe {
  0%, 100% { transform: translateY(-4px); }

}

/* =========================================================
   GLOBAL ANIMATIONS & SMOOTH TRANSITIONS
========================================================= */
* {

}

/* Fade in animation for elements */

    opacity: 0;

  }

    opacity: 1;
    transform: translateY(0);
  }
}

}

  }

  }
}
